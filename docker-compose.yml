services:
  app:
    build: .
    container_name: chat-summary-tg-bot
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
